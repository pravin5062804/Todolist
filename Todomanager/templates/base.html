{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock title %}</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        a{
            text-decoration:none;
        }

        body {
            background-color: white;
        }

        .navbar {
            display: flex;
            align-items: center;
            padding: 15px 40px;
            background-color: #111827;
        }

        .logo {
            font-size: 24px;
            margin-right: 30px;
            color: white;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links li a {
            text-decoration: none;
            color: #9ca3af;
            font-size: 18px;
            position: relative;
            transition: 0.3s;
        }

        .nav-links li a.active {
            color: #ffffff;
        }

        .nav-links li a.active::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 100%;
            height: 2px;
            background-color: white;
        }

        .nav-links li a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo"><a href="{% url "home" %}"><img src="{% static "/images/logo.png" %}" alt="logo"  height="30"></a></div>

        <ul class="nav-links">
            <li><a href="{% url 'home' %}"  >Home</a></li>
            <li><a href="{% url "todolist" %}">TodoList</a></li>
            <li><a href="{% url "contact" %}">Contact Us</a></li>
            <li><a href="{% url "about" %}">About Us</a></li>
        </ul>
    </nav>

    <!-- Page Content -->
    {% block content %}
    {% endblock %}

    {% block main %}{% endblock main %}

</body>
</html>
